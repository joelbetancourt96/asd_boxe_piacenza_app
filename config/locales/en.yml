  # About Us
  about_us:
    title: "ABOUT US"
    paragraph_1: "For over 50 years, Boxe Piacenza has been the reference point for boxing in Piacenza. Founded by Bruno Orsi, a former boxer, the club has a solid history of excellence and dedication; we have developed a community of athletes and enthusiasts who share a passion for sport and personal improvement."
    paragraph_2: "In a 5,000 sqm space, bright and detailed, you will find everything you need to experience 360° well-being. Our gym offers a welcoming and motivating environment where every athlete, from beginner to professional, can find the support and resources needed to reach their goals."
    paragraph_3: "With more than 40 hours of weekly activities and qualified instructors, we accompany you on a tailored journey to stay fit, improve sports performance, regain energy, and achieve your goals."
    paragraph_4: "Boxe Piacenza is your space to train, regenerate, and feel good every day."

