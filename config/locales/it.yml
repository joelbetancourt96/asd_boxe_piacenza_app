    subtitle: "Palestra Bruno Orsi dal 1968"
    description: "Scopri i corsi dedicati ad atleti agonisti e amatori, progettati per potenziare tecnica, resistenza e spirito di squadra."
    button_text: "Scopri i corsi"

  # About Us
  about_us:
    title: "CHI SIAMO"
    paragraph_1: "Da oltre 50 anni La Boxe piacenza è il punto di riferimento per la pratice del pugilato a Piacenza. Fondata da Bruno Orsi, ex pugile, la società ha una storia consolidata di eccellenza e dedizione, abbiamo sviluppato una comunità di atleti e appassionati che condividono la passione per lo sport e il miglioramento personale."
    paragraph_2: "In uno spazio di 5.000 mq, luminoso e curato nei dettagli, trovi tutto ciò che serve per vivere il benessere a 360°. La nostra palestra offre un ambiente accogliente e motivante, dove ogni atleta, dal principiante all'agonista, può trovare il supporto e le risorse necessarie per raggiungere i propri obiettivi."
    paragraph_3: "Con più di 40 ore di attività settimanali e istruttori qualificati, vi accompagniamo in un percorso su misura per restare in forma, migliorare la performance sportiva, ritrovare energia e raggiungere i vostri obiettivi."
    paragraph_4: "La Boxe piacenza è il tuo spazio per allenarti, rigenerarti e stare bene ogni giorno."

  # Courses
  courses:
    title: "SCEGLI IL CORSO ADATTO ALLE TUE ESIGENZE"
    description: "Che tu voglia scoprire la boxe per rimetterti in forma, migliorare la tua resistenza o trovare un ritmo adatto al tuo stile di vita, qui trovi corsi pensati per ogni livello: agonisti, amatori, giovani e bambini."
